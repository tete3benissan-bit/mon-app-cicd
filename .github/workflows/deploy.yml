name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push Docker image
      run: |
        docker build -t 265929099830.dkr.ecr.eu-north-1.amazonaws.com/mon-app-cicd:latest .
        docker push 265929099830.dkr.ecr.eu-north-1.amazonaws.com/mon-app-cicd:latest

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: 51.21.194.211
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 265929099830.dkr.ecr.eu-north-1.amazonaws.com
          docker stop mon-app 2>/dev/null || true
          docker rm mon-app 2>/dev/null || true
          docker pull 265929099830.dkr.ecr.eu-north-1.amazonaws.com/mon-app-cicd:latest
          docker run -d --name mon-app -p 80:80 --restart always 265929099830.dkr.ecr.eu-north-1.amazonaws.com/mon-app-cicd:latest
          echo "Déployé avec succès !"